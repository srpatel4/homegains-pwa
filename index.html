<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomeGains | Workout Arena</title>
    <meta name="description" content="A comprehensive 3-day push/pull/legs home workout routine requiring zero equipment. Build muscle at home.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HomeGains">
    <meta name="theme-color" content="#030303">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="progress-container">
        <div class="progress-bar" id="workout-progress"></div>
    </div>
    <nav class="kinetic-nav">
        <a href="landing.html" style="text-decoration:none;">
            <div class="logo glitch-hover" data-text="KINETICFIT">KINETIC<span>FIT</span></div>
        </a>
    </nav>

    <header class="header">
        <h1 class="header-title glitch-hover" data-text="HomeGains">Home<span class="highlight">Gains</span></h1>
        <p class="subtitle">Zero Equipment • 3-Day Muscle Building Split</p>
    </header>

    <main class="container">
        <div class="tabs">
            <button class="tab-btn active" data-target="push">
                DAY 1: PUSH
            </button>
            <button class="tab-btn" data-target="pull">
                DAY 2: PULL
            </button>
            <button class="tab-btn" data-target="legs">
                DAY 3: LEGS
            </button>
        </div>

        <div id="workout-container" class="content-area">
            <!-- Content will be injected by JavaScript -->
        </div>
    </main>

    <footer>
        <p>Consistency is key. Rest 60-90 seconds between sets.</p>
    </footer>

    <!-- Floating Rest Timer -->
    <div class="floating-timer">
        <div class="timer-display">01:00</div>
        <div class="timer-controls">
            <button id="timer-preset-60" class="timer-btn preset-btn">60s</button>
            <button id="timer-preset-90" class="timer-btn preset-btn">90s</button>
            <button id="timer-start" class="timer-btn action-btn">▶</button>
            <button id="timer-reset" class="timer-btn action-btn">↻</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
